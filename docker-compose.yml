services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_OKTA_ISSUER=${VITE_OKTA_ISSUER}
        - VITE_OKTA_CLIENT_ID=${VITE_OKTA_CLIENT_ID}
        - VITE_OKTA_REDIRECT_URI=${VITE_OKTA_REDIRECT_URI}
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/homebase
    volumes:
      - uploads_data:/app/uploads

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  uploads_data:
